kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: managed-premium
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 50Gi
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 2000m
          memory: 2Gi

  grafana:
    adminPassword: ""  # Set via Key Vault secret injection
    persistence:
      enabled: true
      storageClassName: managed-premium
      size: 10Gi
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
      hosts:
        - grafana.platform.internal
    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: managed-premium
            resources:
              requests:
                storage: 5Gi
    config:
      global:
        slack_api_url: ""  # Injected from Key Vault
      route:
        group_by: [alertname, cluster, namespace]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: slack-platform
        routes:
          - match:
              severity: critical
            receiver: slack-platform
            repeat_interval: 1h
      receivers:
        - name: slack-platform
          slack_configs:
            - channel: "#platform-alerts"
              send_resolved: true
              title: "{{ .GroupLabels.alertname }}"
              text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"

  kubeStateMetrics:
    enabled: true

  nodeExporter:
    enabled: true
