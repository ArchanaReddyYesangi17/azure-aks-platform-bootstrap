apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-aks-platform
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    {{- include "observability.labels" . | nindent 4 }}
data:
  aks-platform-overview.json: |-
    {
      "title": "AKS Platform Overview",
      "uid": "aks-platform",
      "tags": ["aks", "azure", "platform"],
      "refresh": "30s",
      "schemaVersion": 38,
      "panels": [
        {
          "id": 1,
          "title": "Ready Nodes",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "targets": [{
            "expr": "count(kube_node_status_condition{condition=\"Ready\",status=\"true\"} == 1)",
            "legendFormat": "Ready"
          }],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "red",   "value": 0 },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Running Pods",
          "type": "stat",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "targets": [{
            "expr": "count(kube_pod_status_phase{phase=\"Running\"} == 1)",
            "legendFormat": "Running"
          }]
        },
        {
          "id": 3,
          "title": "Node CPU Utilization",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [{
            "expr": "100 - (avg by(node) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
            "legendFormat": "{{node}}"
          }],
          "fieldConfig": { "defaults": { "unit": "percent" } }
        },
        {
          "id": 4,
          "title": "Node Memory Utilization",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [{
            "expr": "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100",
            "legendFormat": "{{instance}}"
          }],
          "fieldConfig": { "defaults": { "unit": "percent" } }
        },
        {
          "id": 5,
          "title": "Pod Restarts (1h)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [{
            "expr": "increase(kube_pod_container_status_restarts_total[1h]) > 0",
            "legendFormat": "{{namespace}}/{{pod}}"
          }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 6,
          "title": "Ingress Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [{
            "expr": "sum by(ingress) (rate(nginx_ingress_controller_requests[5m]))",
            "legendFormat": "{{ingress}}"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        }
      ]
    }
